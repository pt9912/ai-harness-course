; ADR-0001 Layering als import-linter Contracts.
; Verstöße brechen `make arch-check`.

[importlinter]
root_package = docsearch

[importlinter:contract:layers]
name = Hexagonal layering (ADR-0001)
type = layers
layers =
    docsearch.ui
    docsearch.service
    docsearch.index
    docsearch.embedding
    docsearch.types
; Bedeutung: jede Schicht darf nur "abwärts" importieren.
; ui darf service, index (verboten!), embedding (verboten!) — wir
; ergänzen den expliziten "forbidden"-Contract dafür:

[importlinter:contract:ui-isolation]
name = UI darf nicht direkt auf index oder embedding (ADR-0001)
type = forbidden
source_modules =
    docsearch.ui
forbidden_modules =
    docsearch.index
    docsearch.embedding
