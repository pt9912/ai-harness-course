# Stabiler, login-freier Download für lab/templates und das Agents-Regelwerk:
# bei einem Release-Tag (`vX.Y.Z`, historisch `templates-v*`) werden das ZIP und eine self-contained
# `agents-regelwerk.md` (interne Links auf den Tag gepinnt) als Release-Assets
# angehängt. Permanente URLs: …/releases/latest/download/lab-templates.zip
# bzw. …/releases/latest/download/agents-regelwerk.md
# (Ergänzung zum Actions-Artifact aus templates-zip.yml, das pro
# Änderung auf main eine Vorschau liefert, aber Login erfordert und
# nach 90 Tagen verfällt.)
name: templates-release

on:
  push:
    tags: ["v[0-9]*", "templates-v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Kurs-Verweise auf den Tag pinnen
        run: bash tools/rewrite-template-links.sh lab/templates "$GITHUB_REF_NAME"
      - name: ZIP bauen
        run: |
          cd lab/templates
          zip -r "$GITHUB_WORKSPACE/lab-templates.zip" .
      - name: Agents-Regelwerk als self-contained Asset rewriten (Links auf den Tag pinnen)
        run: |
          cp kurs/de/agents-regelwerk.md "$GITHUB_WORKSPACE/agents-regelwerk.md"
          python3 tools/rewrite-doc-links.py "$GITHUB_WORKSPACE/agents-regelwerk.md" kurs/de "$GITHUB_REF_NAME" .
      - name: Release anlegen, Assets anhängen
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" lab-templates.zip agents-regelwerk.md \
            --verify-tag \
            --title "Release $GITHUB_REF_NAME" \
            --notes "ZIP-Stand von \`lab/templates\` plus self-contained \`agents-regelwerk.md\` (interne Verweise auf \`$GITHUB_REF_NAME\` gepinnt) beim Tag \`$GITHUB_REF_NAME\`."
