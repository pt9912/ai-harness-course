# Stellt lab/templates (Artifact `lab-templates`) und eine self-contained
# `agents-regelwerk.md` (Artifact `agents-regelwerk`, interne Links auf main
# gepinnt) als Vorschau-Artifacts bereit. Läuft bei Änderung an Templates,
# Regelwerk oder Rewrite-Tool auf main; workflow_dispatch erlaubt manuelles
# Neu-Erzeugen, da Artifacts nach 90 Tagen verfallen.
name: templates-zip

on:
  push:
    branches: [main]
    paths:
      - "lab/templates/**"
      - "kurs/de/agents-regelwerk.md"
      - "tools/rewrite-doc-links.py"
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Kurs-Verweise auf den Vorschau-Stand (main) pinnen
        run: bash tools/rewrite-template-links.sh lab/templates main
      - name: Templates als Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: lab-templates
          path: lab/templates
          if-no-files-found: error
          retention-days: 90
      - name: Agents-Regelwerk (Vorschau, main) als self-contained Kopie rewriten
        run: |
          cp kurs/de/agents-regelwerk.md "$RUNNER_TEMP/agents-regelwerk.md"
          python3 tools/rewrite-doc-links.py "$RUNNER_TEMP/agents-regelwerk.md" kurs/de main .
      - name: Regelwerk als Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: agents-regelwerk
          path: ${{ runner.temp }}/agents-regelwerk.md
          if-no-files-found: error
          retention-days: 90
